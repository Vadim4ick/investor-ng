<app-dialog
  [open]="open()"
  (openChange)="open.set($event)"
  title="Добавить операцию"
  description="Укажите название операции, ее категорию и сумму."
  size="md"
>
  <div class="flex flex-col gap-4">
    <!-- <app-select
        [options]="options()"
        placeholder="Выберите категорию"
        label="Категория"
        [searchable]="false"
        [formControl]="categoryCtrl"
      ></app-select> -->

    <div class="flex flex-col gap-2">
      <span class="text-sm font-medium">Категория</span>

      <div class="flex flex-wrap gap-2">
        @for (option of options(); track option.value) {
          <button
            type="button"
            class="flex items-center gap-2 rounded-full border px-3 py-1.5 text-sm transition cursor-pointer"
            [class.bg-primary]="categoryCtrl.value === option.value"
            [class.text-white]="categoryCtrl.value === option.value"
            [class.border-primary]="categoryCtrl.value === option.value"
            (click)="categoryCtrl.setValue(option.value)"
          >
            {{ option.label }}

            <span
              class="ml-1 text-xs opacity-70 hover:opacity-100 cursor-pointer"
              (click)="deleteCategory(option.value); $event.stopPropagation()"
            >
              ✕
            </span>
          </button>
        }

        <button
          type="button"
          class="rounded-full border px-3 py-1.5 text-sm text-muted-foreground cursor-pointer"
          (click)="openCreateCategory()"
        >
          + Добавить
        </button>
      </div>
    </div>

    <label class="flex flex-col gap-1">
      <span class="text-sm font-medium">Описание</span>

      <input
        ubInput
        type="text"
        placeholder="Покупка в Магните"
        class="w-full"
        [formControl]="descriptionCtrl"
      />
    </label>

    <label class="flex flex-col gap-1">
      <span class="text-sm font-medium">Цена</span>

      <input
        ubInput
        ubMoneyInput
        type="text"
        placeholder="1 000"
        class="w-full"
        [formControl]="amountCtrl"
      />
    </label>

    @if (createErrorMessage()) {
      <p class="text-sm text-red-500">{{ createErrorMessage() }}</p>
    }
  </div>

  <div dialogActions class="flex items-center gap-2">
    <button ubButton variant="secondary" (click)="open.set(false)">Отмена</button>
    <button ubButton [disabled]="isCreating()" (click)="confirm()">
      {{ isCreating() ? 'Сохранение...' : 'Сохранить' }}
    </button>
  </div>
</app-dialog>
